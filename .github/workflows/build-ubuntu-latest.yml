name: build ubuntu-latest

on:
  push:
    branches:
      - master
      - V04
  pull_request:
    branches:
      - master
      - V04

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y vdr-dev libavcodec-dev libavformat-dev libavfilter-dev cppcheck build-essential
      - name: make all
        run: make all
      - name: make cppcheck
        run: make cppcheck

